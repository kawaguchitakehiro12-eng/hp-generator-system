<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP発電機システム</title>

<style>
:root{
  --bg:#efe9df;
  --paper:#fffaf2;
  --ink:#1d1712;
  --sub:#6d6258;
  --accent:#9b7a3b;
  --dark:#17120d;
  --line:rgba(29,23,18,.14);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:"Times New Roman","Noto Serif JP",serif;
}

.admin{
  max-width:1120px;
  margin:40px auto;
  background:#fff;
  padding:32px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h1{font-size:32px;margin:0 0 8px;}
h2{margin-top:36px;border-left:5px solid var(--accent);padding-left:12px;}
label{font-weight:bold;margin-top:18px;display:block;}

input,textarea,select{
  width:100%;
  padding:13px;
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:8px;
  box-sizing:border-box;
  font-size:15px;
}

textarea{min-height:92px;}

button{
  background:#111;
  color:#fff;
  border:0;
  padding:14px 24px;
  border-radius:8px;
  margin-top:24px;
  cursor:pointer;
  font-size:16px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

.toggle{
  display:flex;
  align-items:center;
  gap:10px;
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
}

.toggle input{width:auto;margin:0;}

.input-section{display:block;}

.menu-item{
  background:#fafafa;
  border:1px solid #eee;
  border-radius:14px;
  padding:20px;
  margin-top:18px;
}

.add-btn{background:var(--accent);}

.preview{
  display:none;
  margin-top:54px;
  overflow:hidden;
  background:var(--paper);
  border-radius:24px;
  border:1px solid var(--line);
}

/* ===== 参考サイト寄せプレビュー ===== */

.site-header{
  position:relative;
  background:var(--dark);
  color:#fff;
}

.site-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 42px;
  border-bottom:1px solid rgba(255,255,255,.16);
  letter-spacing:.12em;
}

.site-logo{
  font-size:22px;
  letter-spacing:.18em;
}

.site-menu{
  font-size:13px;
  color:rgba(255,255,255,.78);
}

.hero{
  min-height:680px;
  background:#111;
  background-size:cover;
  background-position:center;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.65),rgba(0,0,0,.22),rgba(0,0,0,.58));
}

.hero-inner{
  position:relative;
  z-index:2;
  color:#fff;
  padding:30px;
}

.hero-kicker{
  font-size:15px;
  letter-spacing:.35em;
  color:#d7c08a;
  margin-bottom:22px;
}

.hero h2{
  font-size:62px;
  letter-spacing:.18em;
  margin:0 0 24px;
  font-weight:400;
}

.hero p{
  font-size:22px;
  letter-spacing:.12em;
  line-height:1.9;
}

.lead-copy{
  background:var(--dark);
  color:#fff;
  padding:90px 50px;
  text-align:center;
}

.lead-copy h3{
  font-size:42px;
  letter-spacing:.22em;
  font-weight:400;
  margin:0 0 28px;
  color:#d7c08a;
}

.lead-copy p{
  max-width:760px;
  margin:0 auto;
  line-height:2.2;
  font-size:17px;
}

.story-section{
  padding:110px 70px;
  background:var(--paper);
  border-bottom:1px solid var(--line);
}

.story-grid{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:58px;
  align-items:center;
}

.story-grid.reverse{
  grid-template-columns:.95fr 1.05fr;
}

.story-text .en{
  color:var(--accent);
  letter-spacing:.25em;
  font-size:14px;
  margin-bottom:14px;
  text-transform:uppercase;
}

.story-text h3{
  font-size:38px;
  line-height:1.65;
  font-weight:400;
  margin:0 0 24px;
}

.story-text p{
  line-height:2.2;
  color:var(--sub);
  white-space:pre-wrap;
}

.photo-frame{
  min-height:410px;
  background:#ddd;
  background-size:cover;
  background-position:center;
  border-radius:2px;
  box-shadow:24px 24px 0 rgba(155,122,59,.16);
}

.menu-section{
  background:#17120d;
  color:#fff;
  padding:110px 70px;
}

.section-title{
  text-align:center;
  margin-bottom:54px;
}

.section-title .en{
  color:#d7c08a;
  letter-spacing:.35em;
  font-size:14px;
  margin-bottom:12px;
}

.section-title h3{
  font-size:42px;
  font-weight:400;
  letter-spacing:.18em;
  margin:0;
}

.section-title p{
  max-width:760px;
  margin:24px auto 0;
  color:rgba(255,255,255,.75);
  line-height:2;
  white-space:pre-wrap;
}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:34px;
}

.menu-card{
  background:#231b13;
  border:1px solid rgba(215,192,138,.28);
}

.menu-card-img{
  height:280px;
  background:#333;
  background-size:cover;
  background-position:center;
}

.menu-card-body{
  padding:28px;
}

.menu-card-body h4{
  margin:0 0 14px;
  font-size:24px;
  font-weight:400;
  color:#fff;
}

.menu-card-body p{
  line-height:1.9;
  color:rgba(255,255,255,.72);
  white-space:pre-wrap;
}

.price{
  margin-top:18px;
  color:#d7c08a;
  font-size:19px;
  letter-spacing:.08em;
}

.wine-section{
  padding:110px 70px;
  background:#f7f1e8;
}

.floor-section{
  padding:110px 70px;
  background:var(--paper);
}

.news-section{
  padding:80px 70px;
  background:#17120d;
  color:#fff;
  text-align:center;
}

.news-section h3{
  color:#d7c08a;
  letter-spacing:.25em;
  font-weight:400;
}

.news-section p{
  white-space:pre-wrap;
  line-height:2;
}

.info-section{
  padding:110px 70px;
  background:#f4efe6;
}

.info-wrap{
  display:grid;
  grid-template-columns:.8fr 1.2fr;
  gap:50px;
}

.info-logo{
  font-size:34px;
  letter-spacing:.18em;
  line-height:1.5;
}

.info-table p{
  display:grid;
  grid-template-columns:150px 1fr;
  gap:20px;
  border-bottom:1px solid var(--line);
  padding:16px 0;
  margin:0;
  line-height:1.8;
}

.reserve-btn{
  display:inline-block;
  margin-top:28px;
  padding:14px 28px;
  background:var(--dark);
  color:#fff;
  text-decoration:none;
  letter-spacing:.12em;
}

/* テーマ差分 */
.theme-italian{--dark:#140f0a;--paper:#fff8ee;--accent:#a9833d;}
.theme-izakaya{
  --dark:#1b0f08;
  --paper:#f7f3ea;
  --ink:#24160b;
  --sub:#6b5037;
  --accent:#b66a2c;

  background-color:var(--paper);
  background-image:
    radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    radial-gradient(rgba(210,175,90,.22) 1px, transparent 1px),
    linear-gradient(135deg, rgba(255,255,255,.55), rgba(246,232,205,.35));

  background-size:
    220px 220px,
    38px 38px,
    auto;

  background-position:
    0 0,
    12px 18px,
    0 0;
}
  .theme-izakaya .preview,
.theme-izakaya .story-section,
.theme-izakaya .floor-section,
.theme-izakaya .info-section{
  background-color:var(--paper);

  background-image:
    radial-gradient(rgba(255,255,255,.55) 1px, transparent 1px),
    radial-gradient(rgba(184,132,44,.22) 1px, transparent 1px),
    linear-gradient(135deg,#fffaf0,#f6ead6);

  background-size:
    180px 180px,
    42px 42px,
    auto;

  background-position:
    0 0,
    18px 30px,
    0 0;
}
.theme-cafe{--dark:#d6c0a2;--paper:#fffdf8;--ink:#40362f;--accent:#b7956f;}
.theme-bar{--dark:#060611;--paper:#13131e;--ink:#f5f2ff;--sub:#cfc9e8;--accent:#a855f7;}
.theme-washoku{--dark:#111;--paper:#f4efe2;--accent:#967331;}

.theme-cafe .site-header,
.theme-cafe .lead-copy,
.theme-cafe .menu-section,
.theme-cafe .news-section{
  color:#3d332c;
}

.theme-cafe .hero::after{
  background:linear-gradient(90deg,rgba(255,255,255,.45),rgba(255,255,255,.08),rgba(255,255,255,.35));
}

.theme-bar .story-section,
.theme-bar .floor-section,
.theme-bar .info-section{
  background:#13131e;
  color:#f5f2ff;
}

.theme-bar .story-text p,
.theme-bar .info-table p{
  color:#cfc9e8;
}

.theme-bar .menu-card{
  background:rgba(255,255,255,.06);
  border-color:rgba(168,85,247,.42);
}

@media(max-width:800px){
  .admin{margin:0;border-radius:0;padding:22px;}
  .grid,.story-grid,.story-grid.reverse,.menu-grid,.info-wrap{grid-template-columns:1fr;}
  .site-nav{padding:18px 22px;display:block;}
  .site-menu{margin-top:10px;line-height:1.8;}
  .hero{min-height:560px;}
  .hero h2{font-size:38px;}
  .story-section,.menu-section,.wine-section,.floor-section,.info-section{padding:70px 24px;}
  .info-table p{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="admin">
  <h1>HP発電機システム</h1>
  <p>高級飲食店HP風のプレビューを自動生成します。</p>

  <h2>基本情報</h2>
  <div class="grid">
    <div>
      <label>テンプレート</label>
      <select id="template" onchange="applyTheme()">
        <option value="italian">イタリアン</option>
        <option value="izakaya">居酒屋</option>
        <option value="cafe">カフェ</option>
        <option value="bar">バー</option>
        <option value="washoku">和食</option>
      </select>
    </div>
    <div>
      <label>店舗名</label>
      <input id="shopName" placeholder="例：ku:de kiyo">
    </div>
  </div>

  <label>キャッチコピー</label>
  <input id="catchCopy" placeholder="例：記憶に残る一皿とは">

  <label>メイン画像</label>
  <input type="file" id="heroImage" accept="image/*">

  <h2>表示設定</h2>
  <div class="grid">
    <label class="toggle"><input type="checkbox" id="showConcept" checked onchange="toggleInputs()">CONCEPTを表示</label>
    <label class="toggle"><input type="checkbox" id="showCourse" checked onchange="toggleInputs()">COURSEを表示</label>
    <label class="toggle"><input type="checkbox" id="showMenu" checked onchange="toggleInputs()">MENUを表示</label>
    <label class="toggle"><input type="checkbox" id="showLunch" checked onchange="toggleInputs()">LUNCHを表示</label>
    <label class="toggle"><input type="checkbox" id="showDrink" checked onchange="toggleInputs()">WINE / DRINKを表示</label>
    <label class="toggle"><input type="checkbox" id="showSpace" checked onchange="toggleInputs()">FLOORを表示</label>
    <label class="toggle"><input type="checkbox" id="showNews" checked onchange="toggleInputs()">NEWSを表示</label>
  </div>

  <div class="input-section" id="inputConcept">
    <h2>コンセプト</h2>
    <label>コンセプト見出し</label>
    <input id="conceptTitle" placeholder="例：「あれが美味しかった」に出合うこと">
    <label>コンセプト本文</label>
    <textarea id="conceptText" placeholder="お店のこだわりや世界観を入力"></textarea>
    <label>コンセプト画像</label>
    <input type="file" id="conceptImage" accept="image/*">
  </div>

  <div class="input-section" id="inputCourse">
    <h2>コース</h2>
    <label>COURSE見出し</label>
    <input id="courseTitle" placeholder="例：素材を活かした“今日”を味わうコース">
    <label>COURSE本文</label>
    <textarea id="courseText" placeholder="コース内容や利用シーンを入力"></textarea>
  </div>

  <div class="input-section" id="inputMenu">
    <h2>メニュー</h2>
    <label>MENU全体説明</label>
    <textarea id="menuText" placeholder="料理の特徴やおすすめメニュー"></textarea>

    <div id="menuItems">
      <div class="menu-item">
        <h3>メニュー 1</h3>
        <label>料理名</label>
        <input class="menuName" placeholder="例：季節の前菜">
        <label>説明</label>
        <textarea class="menuDesc" placeholder="例：旬の食材を活かした一皿"></textarea>
        <label>価格</label>
        <input class="menuPrice" placeholder="例：¥1,800">
        <label>画像</label>
        <input type="file" class="menuImage" accept="image/*">
      </div>
    </div>

    <button type="button" class="add-btn" onclick="addMenuItem()">＋ メニュー追加</button>
  </div>

  <div class="input-section" id="inputLunch">
    <h2>ランチ</h2>
    <label>LUNCH本文</label>
    <textarea id="lunchText" placeholder="ランチ利用について"></textarea>
  </div>

  <div class="input-section" id="inputDrink">
    <h2>ワイン・ドリンク</h2>
    <label>WINE / DRINK本文</label>
    <textarea id="drinkText" placeholder="ワイン、カクテル、ドリンクについて"></textarea>
  </div>

  <div class="input-section" id="inputSpace">
    <h2>空間・席</h2>
    <label>FLOOR本文</label>
    <textarea id="spaceText" placeholder="店内空間、席、個室、貸切など"></textarea>
    <label>FLOOR画像</label>
    <input type="file" id="spaceImage" accept="image/*">
  </div>

  <div class="input-section" id="inputNews">
    <h2>ニュース</h2>
    <label>NEWS本文</label>
    <textarea id="newsText" placeholder="キャンペーン、営業時間変更、新メニューなど"></textarea>
  </div>

  <h2>店舗情報</h2>
  <div class="grid">
    <div><label>住所</label><input id="address" placeholder="東京都港区赤坂〇〇"></div>
    <div><label>電話番号</label><input id="tel" placeholder="03-0000-0000"></div>
    <div><label>営業時間</label><input id="hours" placeholder="11:00〜23:00"></div>
    <div><label>定休日</label><input id="holiday" placeholder="水曜日"></div>
    <div><label>アクセス</label><input id="access" placeholder="赤坂駅 徒歩1分"></div>
    <div><label>予約URL</label><input id="reserveUrl" placeholder="https://..."></div>
  </div>

  <button onclick="createPreview()">HPを作成する</button>

  <div class="preview theme-italian" id="preview">
    <div class="site-header">
      <div class="site-nav">
        <div class="site-logo" id="pLogo">SHOP NAME</div>
        <div class="site-menu" id="pNav"></div>
      </div>

      <div class="hero" id="pHero">
        <div class="hero-inner">
          <div class="hero-kicker">RESTAURANT</div>
          <h2 id="pShopName">店舗名</h2>
          <p id="pCatchCopy">キャッチコピー</p>
        </div>
      </div>
    </div>

    <div class="lead-copy" id="sectionConcept">
      <h3 id="pConceptTitle"></h3>
      <p id="pConceptText"></p>
    </div>

    <div class="story-section">
      <div class="story-grid">
        <div class="story-text">
          <div class="en">concept</div>
          <h3 id="pConceptTitle2"></h3>
          <p id="pConceptText2"></p>
        </div>
        <div class="photo-frame" id="pConceptImage"></div>
      </div>
    </div>

    <div class="story-section" id="sectionCourse">
      <div class="story-grid reverse">
        <div class="photo-frame" id="pCourseImage"></div>
        <div class="story-text">
          <div class="en">course</div>
          <h3 id="pCourseTitle"></h3>
          <p id="pCourseText"></p>
        </div>
      </div>
    </div>

    <div class="menu-section" id="sectionMenu">
      <div class="section-title">
        <div class="en">menu</div>
        <h3>MENU</h3>
        <p id="pMenuText"></p>
      </div>
      <div class="menu-grid" id="pMenuCards"></div>
    </div>

    <div class="wine-section" id="sectionLunch">
      <div class="story-text">
        <div class="en">lunch</div>
        <h3>LUNCH</h3>
        <p id="pLunchText"></p>
      </div>
    </div>

    <div class="wine-section" id="sectionDrink">
      <div class="story-grid">
        <div class="story-text">
          <div class="en">wine</div>
          <h3>WINE / DRINK</h3>
          <p id="pDrinkText"></p>
        </div>
        <div class="photo-frame" id="pDrinkImage"></div>
      </div>
    </div>

    <div class="floor-section" id="sectionSpace">
      <div class="story-grid reverse">
        <div class="photo-frame" id="pSpaceImage"></div>
        <div class="story-text">
          <div class="en">floor</div>
          <h3>FLOOR</h3>
          <p id="pSpaceText"></p>
        </div>
      </div>
    </div>

    <div class="news-section" id="sectionNews">
      <h3>NEWS</h3>
      <p id="pNewsText"></p>
    </div>

    <div class="info-section">
      <div class="info-wrap">
        <div>
          <div class="info-logo" id="pInfoLogo">SHOP NAME</div>
          <a class="reserve-btn" id="pReserveBtn" href="#" target="_blank">WEB予約はこちら</a>
        </div>

        <div class="info-table">
          <p><strong>住所</strong><span id="pAddress"></span></p>
          <p><strong>電話番号</strong><span id="pTel"></span></p>
          <p><strong>営業時間</strong><span id="pHours"></span></p>
          <p><strong>定休日</strong><span id="pHoliday"></span></p>
          <p><strong>アクセス</strong><span id="pAccess"></span></p>
          <p><strong>予約URL</strong><span id="pReserveUrl"></span></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let menuCount = 1;

function val(id, fallback){
  return document.getElementById(id).value || fallback;
}

function checked(id){
  return document.getElementById(id).checked;
}

function setText(id, text){
  document.getElementById(id).textContent = text;
}

function showBlock(id, isShow){
  document.getElementById(id).style.display = isShow ? "block" : "none";
}

function applyTheme(){
  const template = document.getElementById("template").value;
  const preview = document.getElementById("preview");
  const themes = ["theme-italian","theme-izakaya","theme-cafe","theme-bar","theme-washoku"];

  preview.classList.remove(...themes);
  preview.classList.add("theme-" + template);
}

function setFileBg(inputId, previewId){
  const file = document.getElementById(inputId).files[0];
  const preview = document.getElementById(previewId);

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      preview.style.backgroundImage =
        `linear-gradient(rgba(0,0,0,.28),rgba(0,0,0,.28)),url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
  }else{
    preview.style.backgroundImage = "none";
  }
}

function toggleInputs(){
  showBlock("inputConcept", checked("showConcept"));
  showBlock("inputCourse", checked("showCourse"));
  showBlock("inputMenu", checked("showMenu"));
  showBlock("inputLunch", checked("showLunch"));
  showBlock("inputDrink", checked("showDrink"));
  showBlock("inputSpace", checked("showSpace"));
  showBlock("inputNews", checked("showNews"));
}

function addMenuItem(){
  menuCount++;

  const wrapper = document.createElement("div");
  wrapper.className = "menu-item";
  wrapper.innerHTML = `
    <h3>メニュー ${menuCount}</h3>
    <label>料理名</label>
    <input class="menuName" placeholder="例：メイン料理">
    <label>説明</label>
    <textarea class="menuDesc" placeholder="例：素材の味を活かした一皿"></textarea>
    <label>価格</label>
    <input class="menuPrice" placeholder="例：¥2,400">
    <label>画像</label>
    <input type="file" class="menuImage" accept="image/*">
  `;

  document.getElementById("menuItems").appendChild(wrapper);
}

function createMenuCards(){
  const names = document.querySelectorAll(".menuName");
  const descs = document.querySelectorAll(".menuDesc");
  const prices = document.querySelectorAll(".menuPrice");
  const images = document.querySelectorAll(".menuImage");
  const output = document.getElementById("pMenuCards");

  output.innerHTML = "";

  names.forEach((nameInput, index) => {
    const name = nameInput.value;
    const desc = descs[index].value;
    const price = prices[index].value;
    const file = images[index].files[0];

    if(!name && !desc && !price && !file) return;

    const card = document.createElement("div");
    card.className = "menu-card";

    const img = document.createElement("div");
    img.className = "menu-card-img";

    const body = document.createElement("div");
    body.className = "menu-card-body";
    body.innerHTML = `
      <h4>${name || "メニュー名"}</h4>
      <p>${desc || "メニュー説明"}</p>
      <div class="price">${price || "価格未入力"}</div>
    `;

    card.appendChild(img);
    card.appendChild(body);
    output.appendChild(card);

    if(file){
      const reader = new FileReader();
      reader.onload = function(e){
        img.style.backgroundImage = `url(${e.target.result})`;
      };
      reader.readAsDataURL(file);
    }
  });
}

function createPreview(){
  applyTheme();

  const shopName = val("shopName","店舗名");
  const conceptTitle = val("conceptTitle","記憶に残る一皿とは");
