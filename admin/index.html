<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HP発電機システム</title>

  <style>
    :root{
      --bg:#f4f1ec;
      --panel:#ffffff;
      --text:#222;
      --accent:#8b6f3e;
      --dark:#111;
      --nav:#111;
      --card:#fafafa;
    }

    body{
      font-family:"Noto Serif JP",serif;
      background:var(--bg);
      margin:0;
      color:var(--text);
    }

    .admin{
      max-width:1100px;
      margin:40px auto;
      background:#fff;
      padding:32px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    h1{font-size:32px;margin-bottom:8px;}
    h2{margin-top:36px;border-left:5px solid #8b6f3e;padding-left:12px;}

    label{font-weight:bold;margin-top:18px;display:block;}

    input,textarea,select{
      width:100%;
      padding:12px;
      margin-top:8px;
      border:1px solid #ddd;
      border-radius:8px;
      box-sizing:border-box;
      font-size:15px;
    }

    textarea{min-height:90px;}

    button{
      background:#111;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:8px;
      margin-top:24px;
      cursor:pointer;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .toggle{
      display:flex;
      align-items:center;
      gap:10px;
      background:#f8f8f8;
      padding:12px;
      border-radius:10px;
      margin-top:12px;
    }

    .toggle input{width:auto;margin:0;}
    .input-section{display:block;}

    .menu-item{
      background:#fafafa;
      border:1px solid #eee;
      border-radius:14px;
      padding:20px;
      margin-top:18px;
    }

    .add-btn{background:#8b6f3e;}

    .preview{
      display:none;
      margin-top:50px;
      background:var(--panel);
      color:var(--text);
      border-radius:18px;
      overflow:hidden;
      border:1px solid #ddd;
      transition:.3s;
    }

    .hero{
      height:560px;
      background:#111;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      background-size:cover;
      background-position:center;
      position:relative;
    }

    .hero h2{
      font-size:58px;
      border:none;
      padding:0;
      margin:0 0 18px;
      letter-spacing:.12em;
    }

    .hero p{
      font-size:20px;
      letter-spacing:.08em;
    }

    .nav{
      background:var(--nav);
      color:white;
      padding:18px;
      text-align:center;
      letter-spacing:.12em;
      font-size:14px;
    }

    .section{
      padding:76px 58px;
      border-bottom:1px solid rgba(0,0,0,.08);
      background:var(--panel);
    }

    .section h3{
      font-size:34px;
      margin-bottom:18px;
      color:var(--accent);
      letter-spacing:.12em;
    }

    .section p{
      line-height:1.9;
      white-space:pre-wrap;
    }

    .image{
      width:100%;
      height:330px;
      background:#ddd;
      border-radius:14px;
      background-size:cover;
      background-position:center;
      margin-top:24px;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      margin-top:28px;
    }

    .menu-card{
      background:var(--card);
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.08);
    }

    .menu-card-img{
      height:230px;
      background:#ddd;
      background-size:cover;
      background-position:center;
    }

    .menu-card-body{padding:22px;}

    .menu-card-body h4{
      font-size:22px;
      margin:0 0 10px;
    }

    .price{
      font-weight:bold;
      color:var(--accent);
      font-size:18px;
      margin-top:12px;
    }

    .info-table p{
      border-bottom:1px solid rgba(0,0,0,.08);
      padding:12px 0;
      margin:0;
    }

    /* テンプレ別デザイン */
    /* テンプレ別デザイン強化版 */

.theme-italian{
  --bg:#0f0b08;
  --panel:#fff7ea;
  --text:#25170d;
  --accent:#b99045;
  --nav:#0b0705;
  --card:#f4e7d2;
}

.theme-italian .hero{
  min-height:620px;
  border-bottom:8px solid var(--accent);
}

.theme-italian .section{
  padding:90px 70px;
}

.theme-italian .section h3{
  font-size:38px;
  border-bottom:1px solid var(--accent);
  padding-bottom:14px;
}

.theme-izakaya{
  --bg:#2a1609;
  --panel:#fff1d6;
  --text:#2b1608;
  --accent:#d06b22;
  --nav:#301305;
  --card:#ffe3b2;
}

.theme-izakaya .section{
  border-radius:0;
  background:linear-gradient(135deg,#fff1d6,#ffe2b5);
}

.theme-izakaya .section h3{
  background:#2b1608;
  color:#ffd28a;
  display:inline-block;
  padding:10px 18px;
  border-radius:4px;
}

.theme-izakaya .menu-card{
  border:2px solid #8b3e12;
}

.theme-cafe{
  --bg:#f8f2e9;
  --panel:#fffdf8;
  --text:#3b3028;
  --accent:#c4a47c;
  --nav:#d8c3a5;
  --card:#f5ecdf;
}

.theme-cafe .hero{
  height:500px;
  border-radius:0 0 40px 40px;
}

.theme-cafe .section{
  padding:80px 80px;
}

.theme-cafe .section h3{
  font-size:30px;
  color:#a8835e;
}

.theme-cafe .menu-card{
  border-radius:28px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.theme-bar{
  --bg:#070711;
  --panel:#12121f;
  --text:#f5f2ff;
  --accent:#a855f7;
  --nav:#050508;
  --card:#1f1f33;
}

.theme-bar .section{
  background:#12121f;
  color:#f5f2ff;
  border-bottom:1px solid rgba(168,85,247,.35);
}

.theme-bar .section h3{
  color:#c084fc;
  text-shadow:0 0 18px rgba(168,85,247,.8);
}

.theme-bar .menu-card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(168,85,247,.45);
  box-shadow:0 0 25px rgba(168,85,247,.18);
}

.theme-washoku{
  --bg:#12100d;
  --panel:#f5efe2;
  --text:#17120c;
  --accent:#9b7a30;
  --nav:#111;
  --card:#eee2cc;
}

.theme-washoku .section{
  background:#f5efe2;
  border-left:8px solid var(--accent);
}

.theme-washoku .section h3{
  writing-mode:horizontal-tb;
  letter-spacing:.18em;
  border-left:4px solid var(--accent);
  padding-left:16px;
}

.theme-washoku .menu-card{
  border-radius:4px;
  border:1px solid #b9a36c;
}

    @media(max-width:800px){
      .grid,.menu-grid{grid-template-columns:1fr}
      .hero h2{font-size:36px}
      .section{padding:45px 24px}
    }
  </style>
</head>

<body>
<div class="admin">
  <h1>HP発電機システム</h1>
  <p>テンプレートを選ぶと、プレビューのデザインが自動で切り替わります。</p>

  <h2>基本情報</h2>
  <div class="grid">
    <div>
      <label>テンプレート</label>
      <select id="template" onchange="applyTheme()">
        <option value="italian">イタリアン</option>
        <option value="izakaya">居酒屋</option>
        <option value="cafe">カフェ</option>
        <option value="bar">バー</option>
        <option value="washoku">和食</option>
      </select>
    </div>
    <div>
      <label>店舗名</label>
      <input id="shopName" placeholder="例：IL CARDINALE AKASAKA">
    </div>
  </div>

  <label>キャッチコピー</label>
  <input id="catchCopy" placeholder="例：赤坂で楽しむ本格イタリアン">

  <label>メイン画像</label>
  <input type="file" id="heroImage" accept="image/*">

  <h2>表示設定</h2>
  <div class="grid">
    <label class="toggle"><input type="checkbox" id="showConcept" checked onchange="toggleInputs()">CONCEPTを表示</label>
    <label class="toggle"><input type="checkbox" id="showCourse" checked onchange="toggleInputs()">COURSEを表示</label>
    <label class="toggle"><input type="checkbox" id="showMenu" checked onchange="toggleInputs()">MENUを表示</label>
    <label class="toggle"><input type="checkbox" id="showLunch" checked onchange="toggleInputs()">LUNCH & CAFEを表示</label>
    <label class="toggle"><input type="checkbox" id="showDrink" checked onchange="toggleInputs()">DRINKを表示</label>
    <label class="toggle"><input type="checkbox" id="showSpace" checked onchange="toggleInputs()">SPACEを表示</label>
    <label class="toggle"><input type="checkbox" id="showNews" checked onchange="toggleInputs()">NEWSを表示</label>
  </div>
    <div class="input-section" id="inputConcept">
    <h2>コンセプト</h2>
    <label>コンセプト見出し</label>
    <input id="conceptTitle" placeholder="例：本場イタリアの空気を感じるレストラン">
    <label>コンセプト本文</label>
    <textarea id="conceptText" placeholder="お店のこだわりや世界観を入力"></textarea>
    <label>コンセプト画像</label>
    <input type="file" id="conceptImage" accept="image/*">
  </div>

  <div class="input-section" id="inputCourse">
    <h2>コース</h2>
    <label>COURSE見出し</label>
    <input id="courseTitle" placeholder="例：COURSE">
    <label>COURSE本文</label>
    <textarea id="courseText" placeholder="コース内容や利用シーンを入力"></textarea>
  </div>

  <div class="input-section" id="inputMenu">
    <h2>メニュー</h2>
    <label>MENU全体説明</label>
    <textarea id="menuText" placeholder="料理の特徴やおすすめメニュー"></textarea>

    <div id="menuItems">
      <div class="menu-item">
        <h3>メニュー 1</h3>
        <label>料理名</label>
        <input class="menuName" placeholder="例：和牛ステーキ">
        <label>説明</label>
        <textarea class="menuDesc" placeholder="例：厳選した和牛を使用した人気メニュー"></textarea>
        <label>価格</label>
        <input class="menuPrice" placeholder="例：¥2,980">
        <label>画像</label>
        <input type="file" class="menuImage" accept="image/*">
      </div>
    </div>

    <button type="button" class="add-btn" onclick="addMenuItem()">＋ メニュー追加</button>
  </div>

  <div class="input-section" id="inputLunch">
    <h2>ランチ・カフェ</h2>
    <label>LUNCH & CAFE本文</label>
    <textarea id="lunchText" placeholder="ランチやカフェ利用について"></textarea>
  </div>

  <div class="input-section" id="inputDrink">
    <h2>ドリンク</h2>
    <label>DRINK本文</label>
    <textarea id="drinkText" placeholder="ワイン、カクテル、ソフトドリンクなど"></textarea>
  </div>

  <div class="input-section" id="inputSpace">
    <h2>空間・席</h2>
    <label>SPACE本文</label>
    <textarea id="spaceText" placeholder="店内空間、席、個室、貸切など"></textarea>
    <label>SPACE画像</label>
    <input type="file" id="spaceImage" accept="image/*">
  </div>

  <div class="input-section" id="inputNews">
    <h2>ニュース</h2>
    <label>NEWS本文</label>
    <textarea id="newsText" placeholder="キャンペーン、営業時間変更、新メニューなど"></textarea>
  </div>

  <h2>店舗情報</h2>
  <div class="grid">
    <div><label>住所</label><input id="address" placeholder="東京都港区赤坂〇〇"></div>
    <div><label>電話番号</label><input id="tel" placeholder="03-0000-0000"></div>
    <div><label>営業時間</label><input id="hours" placeholder="11:00〜23:00"></div>
    <div><label>定休日</label><input id="holiday" placeholder="年中無休"></div>
    <div><label>アクセス</label><input id="access" placeholder="赤坂駅 徒歩1分"></div>
    <div><label>予約URL</label><input id="reserveUrl" placeholder="https://..."></div>
  </div>

  <button onclick="createPreview()">HPを作成する</button>

  <div class="preview theme-italian" id="preview">
    <div class="nav" id="pNav"></div>

    <div class="hero" id="pHero">
      <div>
        <h2 id="pShopName">店舗名</h2>
        <p id="pCatchCopy">キャッチコピー</p>
      </div>
    </div>

    <div class="section" id="sectionConcept">
      <h3>CONCEPT</h3>
      <h4 id="pConceptTitle"></h4>
      <p id="pConceptText"></p>
      <div class="image" id="pConceptImage"></div>
    </div>

    <div class="section" id="sectionCourse">
      <h3>COURSE</h3>
      <h4 id="pCourseTitle"></h4>
      <p id="pCourseText"></p>
    </div>

    <div class="section" id="sectionMenu">
      <h3>MENU</h3>
      <p id="pMenuText"></p>
      <div class="menu-grid" id="pMenuCards"></div>
    </div>

    <div class="section" id="sectionLunch">
      <h3>LUNCH & CAFE</h3>
      <p id="pLunchText"></p>
    </div>

    <div class="section" id="sectionDrink">
      <h3>DRINK</h3>
      <p id="pDrinkText"></p>
    </div>

    <div class="section" id="sectionSpace">
      <h3>SPACE</h3>
      <p id="pSpaceText"></p>
      <div class="image" id="pSpaceImage"></div>
    </div>

    <div class="section" id="sectionNews">
      <h3>NEWS</h3>
      <p id="pNewsText"></p>
    </div>

    <div class="section">
      <h3>INFORMATION</h3>
      <div class="info-table">
        <p><strong>住所：</strong><span id="pAddress"></span></p>
        <p><strong>電話番号：</strong><span id="pTel"></span></p>
        <p><strong>営業時間：</strong><span id="pHours"></span></p>
        <p><strong>定休日：</strong><span id="pHoliday"></span></p>
        <p><strong>アクセス：</strong><span id="pAccess"></span></p>
        <p><strong>予約URL：</strong><span id="pReserveUrl"></span></p>
      </div>
    </div>
  </div>
</div>

<script>
let menuCount = 1;

function val(id, fallback){
  return document.getElementById(id).value || fallback;
}

function checked(id){
  return document.getElementById(id).checked;
}

function setText(id, text){
  document.getElementById(id).textContent = text;
}

function showBlock(id, isShow){
  document.getElementById(id).style.display = isShow ? "block" : "none";
}

function applyTheme(){
  const template = document.getElementById("template").value;
  const preview = document.getElementById("preview");

  preview.classList.remove(
    "theme-italian",
    "theme-izakaya",
    "theme-cafe",
    "theme-bar",
    "theme-washoku"
  );

  preview.classList.add("theme-" + template);
}

function setFileBg(inputId, previewId){
  const file = document.getElementById(inputId).files[0];
  const preview = document.getElementById(previewId);

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      preview.style.backgroundImage =
        `linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
  }else{
    preview.style.backgroundImage = "none";
  }
}

function toggleInputs(){
  showBlock("inputConcept", checked("showConcept"));
  showBlock("inputCourse", checked("showCourse"));
  showBlock("inputMenu", checked("showMenu"));
  showBlock("inputLunch", checked("showLunch"));
  showBlock("inputDrink", checked("showDrink"));
  showBlock("inputSpace", checked("showSpace"));
  showBlock("inputNews", checked("showNews"));
}

function addMenuItem(){
  menuCount++;

  const wrapper = document.createElement("div");
  wrapper.className = "menu-item";
  wrapper.innerHTML = `
    <h3>メニュー ${menuCount}</h3>
    <label>料理名</label>
    <input class="menuName" placeholder="例：マルゲリータ">
    <label>説明</label>
    <textarea class="menuDesc" placeholder="例：香ばしく焼き上げた人気メニュー"></textarea>
    <label>価格</label>
    <input class="menuPrice" placeholder="例：¥1,480">
    <label>画像</label>
    <input type="file" class="menuImage" accept="image/*">
  `;

  document.getElementById("menuItems").appendChild(wrapper);
}

function createMenuCards(){
  const names = document.querySelectorAll(".menuName");
  const descs = document.querySelectorAll(".menuDesc");
  const prices = document.querySelectorAll(".menuPrice");
  const images = document.querySelectorAll(".menuImage");
  const output = document.getElementById("pMenuCards");

  output.innerHTML = "";

  names.forEach((nameInput, index) => {
    const name = nameInput.value;
    const desc = descs[index].value;
    const price = prices[index].value;
    const file = images[index].files[0];

    if(!name && !desc && !price && !file) return;

    const card = document.createElement("div");
    card.className = "menu-card";

    const img = document.createElement("div");
    img.className = "menu-card-img";

    const body = document.createElement("div");
    body.className = "menu-card-body";
    body.innerHTML = `
      <h4>${name || "メニュー名"}</h4>
      <p>${desc || "メニュー説明"}</p>
      <div class="price">${price || "価格未入力"}</div>
    `;

    card.appendChild(img);
    card.appendChild(body);
    output.appendChild(card);

    if(file){
      const reader = new FileReader();
      reader.onload = function(e){
        img.style.backgroundImage = `url(${e.target.result})`;
      };
      reader.readAsDataURL(file);
    }
  });
}

function createPreview(){
  applyTheme();

  setText("pShopName", val("shopName","店舗名"));
  setText("pCatchCopy", val("catchCopy","キャッチコピー"));

  setText("pConceptTitle", val("conceptTitle","コンセプト見出し"));
  setText("pConceptText", val("conceptText","コンセプト本文が入ります。"));
  setText("pCourseTitle", val("courseTitle","COURSE"));
  setText("pCourseText", val("courseText","コース説明が入ります。"));
  setText("pMenuText", val("menuText","メニュー説明が入ります。"));
  setText("pLunchText", val("lunchText","ランチ・カフェ説明が入ります。"));
  setText("pDrinkText", val("drinkText","ドリンク説明が入ります。"));
  setText("pSpaceText", val("spaceText","空間・席の説明が入ります。"));
  setText("pNewsText", val("newsText","ニュース情報が入ります。"));

  setText("pAddress", val("address","未入力"));
  setText("pTel", val("tel","未入力"));
  setText("pHours", val("hours","未入力"));
  setText("pHoliday", val("holiday","未入力"));
  setText("pAccess", val("access","未入力"));
  setText("pReserveUrl", val("reserveUrl","未入力"));

  setFileBg("heroImage", "pHero");
  setFileBg("conceptImage", "pConceptImage");
  setFileBg("spaceImage", "pSpaceImage");

  createMenuCards();

  showBlock("sectionConcept", checked("showConcept"));
  showBlock("sectionCourse", checked("showCourse"));
  showBlock("sectionMenu", checked("showMenu"));
  showBlock("sectionLunch", checked("showLunch"));
  showBlock("sectionDrink", checked("showDrink"));
  showBlock("sectionSpace", checked("showSpace"));
  showBlock("sectionNews", checked("showNews"));

  const navItems = ["TOP"];
  if(checked("showConcept")) navItems.push("CONCEPT");
  if(checked("showCourse")) navItems.push("COURSE");
  if(checked("showMenu")) navItems.push("MENU");
  if(checked("showLunch")) navItems.push("LUNCH & CAFE");
  if(checked("showDrink")) navItems.push("DRINK");
  if(checked("showSpace")) navItems.push("SPACE");
  if(checked("showNews")) navItems.push("NEWS");
  navItems.push("ACCESS");

  document.getElementById("pNav").textContent = navItems.join(" / ");
  document.getElementById("preview").style.display = "block";
}

toggleInputs();
applyTheme();
</script>

</body>
</html>
